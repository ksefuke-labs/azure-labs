apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: flux-system
spec:
  targetNamespace: traefik
  interval: 30m
  chart:
    spec:
      chart: traefik
      version: "39.0.7"
      releaseName: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      interval: 12h
  install:
    createNamespace: true
  values:
    ingressClass:
      enabled: true
      isDefaultClass: true
      name: traefik             # ← Explicitly set IngressClass name
    providers:
      kubernetesIngress:
        ingressClass: traefik
