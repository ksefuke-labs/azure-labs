apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/customer1/
patches:
  - target:
      kind: ObjectStore
      name: customer1-objectstore
    patch: |-
      - op: replace
        path: /spec/configuration/destinationPath
        value: "https://apollobackupsstaging.blob.core.windows.net/customer1"
  - target:
      kind: SecretProviderClass
      name: customer1-secrets
    patch: |-
      - op: replace
        path: /spec/parameters/userAssignedIdentityID
        value: "861e762a-aedd-4d3a-9194-df5ecb25b0b5"
      - op: replace
        path: /spec/parameters/tenantId
        value: "a591ace9-c2a4-491e-8153-9f9ae2cbee79"
