apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/customer1/
patches:
  - target:
      kind: SecretProviderClass
      name: customer1-secrets
    patch: |-
      - op: replace
        path: /spec/parameters/userAssignedIdentityID
        value: "26ede7be-98b2-4963-a208-86505a99a28d"
      - op: replace
        path: /spec/parameters/tenantId
        value: "a591ace9-c2a4-491e-8153-9f9ae2cbee79"